# Render Blueprint Configuration for InvoiceIQ
# Deploy with: render-cli push or via Render Dashboard

services:
  # Backend API Service
  - type: web
    name: invoiceiq-backend
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # Frontend Static Site
  - type: web
    name: invoiceiq-frontend
    env: static
    region: oregon
    plan: free
    branch: main
    rootDir: ./frontend/invoice-generator
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: invoiceiq-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: invoiceiq-mongodb
    databaseName: invoiceiq
    user: invoiceiq-user
    plan: free
